<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <div class="container">
        <h2>Form Demo</h2>
        <form>
            <div class="row">          
                  <div class="mb-3 col-md-6">
            <label for="email" class="form-label">Email</label>
            <input type="text" class="form-control" placeholder="Email" id="email">
           </div><br>

           <div class="mb-3 col-md-6">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" placeholder="Password" id="password">
            </div><br>
          </div>

            <div class="mb-3">
                <select class="form-control-lg">
                    <option selected>Choose your city</option>
                    <option value="one">Mumbai</option>
                    <option value="two">Delhi</option>
                    <option value="three">Pune</option>
                </select>

            </div>
            <div class="mb-3">
                <select class="form-control">
                    <option selected>Choose your city</option>
                </select>
                
            </div>
            <div class="mb-3">
                <select class="form-control-sm">
                    <option selected>Choose your city</option>
                </select>
            </div>
            <div class="normal mb-3">
                <label for="check">Agree</label>
                <input type="checkbox" id="check">
            </div><br>

            <!-- bootstrap styling for form -->
            <div class="form-check">
                <input type="checkbox" id="checkbs" class="form-check-input">
                <label for="checkbs" class="form-check-label">Agree</label>
            </div><br>

            <div class="form-check">
                <input type="radio" id="radiobs" class="form-check-input">
                <label for="radiobs" class="form-check-label">Yes/No</label>
            </div>

            <div class="form-check form-switch mb-3">
                <input type="checkbox" id="checkbs" class="form-check-input" role="switch">
                <label for="checkbs" class="form-check-label">Default Switch Checkbox input</label>
            </div>
        </form>
    </div>
<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
</body>
</html>
