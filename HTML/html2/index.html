<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML2</title>
</head>
<body>
    <h2>List in HTML</h2>
    <ul>
        <!-- li tag k ander hum simple text bhi likh skte hai or <p> , <h> <img> bhi -->
        <li> <h5>Red</h5> Apple </li>
        <li>Banana</li>
        <li>Mango</li>
    </ul>

    <!-- ordered list -->
     <ol type="1">
        <li>Bread</li>
        <li>Butter</li>
        <li>Jam</li>
     </ol>
</body>
</html>
